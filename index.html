<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Tracker — Semenyih & Banting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f11;
  --surface: #16181c;
  --surface2: #1e2026;
  --border: #2a2d35;
  --accent: #c8f135;
  --accent2: #3df5b0;
  --text: #f0f0ee;
  --muted: #7a7d87;
  --danger: #ff5f5f;
  --warn: #ffb547;
  --info: #5bb8ff;
  --purple: #b87fff;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;font-size:13px}
::selection{background:var(--accent);color:#000}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:8px 12px;font-family:var(--font-mono);font-size:13px;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--surface2)}
button{cursor:pointer;font-family:var(--font-mono);font-size:13px}

/* Layout */
.shell{max-width:1400px;margin:0 auto;padding:24px 20px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.logo{font-family:var(--font-head);font-size:20px;font-weight:700;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-label{font-size:11px;color:var(--muted)}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.metric.m-total::before{background:var(--accent)}
.metric.m-contacted::before{background:var(--accent2)}
.metric.m-apt::before{background:var(--info)}
.metric.m-loan::before{background:var(--warn)}
.metric.m-noanswer::before{background:var(--muted)}
.metric.m-notint::before{background:var(--danger)}
.metric .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.metric .val{font-family:var(--font-head);font-size:28px;font-weight:700}
.metric .sub{font-size:10px;color:var(--muted);margin-top:3px}

/* Funnel */
.funnel{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:24px}
.fcol{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;text-align:center}
.fcol .fn{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--accent)}
.fcol .fl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fcol .fp{font-size:10px;color:var(--muted);margin-top:2px}
.arrow{display:flex;align-items:center;justify-content:center;color:var(--border);font-size:18px;padding-top:8px}

/* Controls */
.controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.controls input{flex:1;min-width:160px}
.controls select{min-width:140px}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500}
.btn-primary:hover{background:#d4ff40;border-color:#d4ff40;color:#000}
.btn-sm{padding:4px 10px;font-size:12px}

/* Table */
.table-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:800px}
thead{background:var(--surface2)}
th{text-align:left;padding:10px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;font-weight:500}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.row-name{font-weight:500;color:var(--text)}
.row-phone{color:var(--muted);font-size:12px}
.row-remark{color:var(--muted);font-size:12px}

/* Badges */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-contacted{background:rgba(61,245,176,.12);color:var(--accent2);border:1px solid rgba(61,245,176,.2)}
.b-apt{background:rgba(91,184,255,.12);color:var(--info);border:1px solid rgba(91,184,255,.2)}
.b-loan{background:rgba(255,181,71,.12);color:var(--warn);border:1px solid rgba(255,181,71,.2)}
.b-noanswer{background:rgba(122,125,135,.1);color:var(--muted);border:1px solid rgba(122,125,135,.2)}
.b-notint{background:rgba(255,95,95,.1);color:var(--danger);border:1px solid rgba(255,95,95,.2)}
.b-phishing{background:rgba(184,127,255,.1);color:var(--purple);border:1px solid rgba(184,127,255,.2)}
.b-subsale{background:rgba(200,241,53,.1);color:var(--accent);border:1px solid rgba(200,241,53,.2)}
.b-nojoin{background:rgba(91,184,255,.08);color:#7dcfff;border:1px solid rgba(91,184,255,.15)}
.b-other{background:rgba(122,125,135,.1);color:var(--muted);border:1px solid rgba(122,125,135,.2)}

/* Pager */
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:8px;flex-wrap:wrap}
.pager-info{font-size:12px;color:var(--muted)}
.pager-btns{display:flex;gap:6px}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--font-head);font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select,.form-group textarea{width:100%}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;font-size:13px;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--accent2);color:var(--accent2)}
.toast.error{border-color:var(--danger);color:var(--danger)}

/* Loading */
.loading{text-align:center;padding:48px;color:var(--muted)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Section label */
.sec-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}

/* Empty */
.empty{text-align:center;padding:48px;color:var(--muted)}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .form-grid .full{grid-column:1}
  .metrics{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">Lead<span>Track</span> <span style="color:var(--muted);font-size:13px;font-family:var(--font-mono);font-weight:400">// Semenyih · Banting</span></div>
    <div class="header-right">
      <div class="sync-dot"></div>
      <span class="sync-label" id="syncLabel">Connecting…</span>
      <button class="btn btn-primary" onclick="openModal()">+ Add Lead</button>
    </div>
  </header>

  <div id="metrics" class="metrics">
    <div class="metric m-total"><div class="label">Total</div><div class="val">—</div></div>
  </div>

  <div class="sec-label">Pipeline</div>
  <div id="funnel" class="funnel"></div>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search name or phone…" oninput="render()">
    <select id="statusFilter" onchange="render()">
      <option value="">All statuses</option>
      <option>Contacted</option>
      <option>No Answer</option>
      <option>Not Interested</option>
      <option>Loan Issues</option>
      <option>Appointment Set</option>
      <option>Subsale Conversion</option>
      <option>Suspicion Phishing Agent</option>
      <option>No Join Name</option>
      <option>Rejecting Call</option>
      <option>Invalid</option>
      <option>Duplicate</option>
      <option>Own Business</option>
    </select>
    <select id="areaFilter" onchange="render()">
      <option value="">All areas</option>
      <option>Semenyih</option>
      <option>Banting</option>
    </select>
    <span id="countLabel" style="color:var(--muted);line-height:36px;font-size:12px"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Area</th>
          <th>Status</th>
          <th>Date</th>
          <th>Salary</th>
          <th>Remark</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="9"><div class="loading"><div class="spinner"></div><br>Loading leads…</div></td></tr>
      </tbody>
    </table>
  </div>
  <div class="pager">
    <span class="pager-info" id="pageInfo"></span>
    <div class="pager-btns">
      <button class="btn btn-sm" id="prevBtn" onclick="changePage(-1)">← Prev</button>
      <button class="btn btn-sm" id="nextBtn" onclick="changePage(1)">Next →</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">Add Lead</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Name *</label><input id="f-name" type="text" placeholder="Full name"></div>
      <div class="form-group"><label>Phone</label><input id="f-phone" type="text" placeholder="0xx-xxx xxxx"></div>
      <div class="form-group"><label>Area</label>
        <select id="f-area"><option>Semenyih</option><option>Banting</option><option>Other</option></select>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="f-status">
          <option>Contacted</option><option>No Answer</option><option>Not Interested</option>
          <option>Loan Issues</option><option>Appointment Set</option><option>Subsale Conversion</option>
          <option>Suspicion Phishing Agent</option><option>No Join Name</option>
          <option>Rejecting Call</option><option>Invalid</option><option>Duplicate</option><option>Own Business</option>
        </select>
      </div>
      <div class="form-group"><label>Date</label><input id="f-date" type="date"></div>
      <div class="form-group"><label>Salary (RM)</label><input id="f-salary" type="text" placeholder="e.g. 3500"></div>
      <div class="form-group full"><label>Remark</label><textarea id="f-remark" rows="3" placeholder="Notes, appointment details, income breakdown…"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLead()" id="saveBtn">Save Lead</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://xgtlpgmsxizmlbvkorou.supabase.co';
const SUPABASE_KEY = 'sb_publishable_f4eiYXs-ybVMIJWtZxjjZg_jyMWSXKF';
const HEADERS = {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};

let leads = [];
let editId = null;
let page = 0;
const PER = 25;

// ── API ──────────────────────────────────────────
async function fetchLeads(){
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/leads?select=*&order=created_at.desc`,{headers:HEADERS});
    if(!r.ok) throw new Error(await r.text());
    leads = await r.json();
    document.getElementById('syncLabel').textContent = 'Live · '+leads.length+' leads';
    render();
  }catch(e){
    document.getElementById('syncLabel').textContent = 'Connection error';
    showToast('Could not load leads: '+e.message,'error');
    document.getElementById('tbody').innerHTML = '<tr><td colspan="9"><div class="empty">⚠ Could not connect to database.</div></td></tr>';
  }
}

async function insertLead(data){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/leads`,{method:'POST',headers:{...HEADERS,'Prefer':'return=representation'},body:JSON.stringify(data)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function updateLead(id,data){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/leads?id=eq.${id}`,{method:'PATCH',headers:{...HEADERS,'Prefer':'return=representation'},body:JSON.stringify(data)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function deleteLead(id){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/leads?id=eq.${id}`,{method:'DELETE',headers:HEADERS});
  if(!r.ok) throw new Error(await r.text());
}

// ── Render ───────────────────────────────────────
function filtered(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const sf=document.getElementById('statusFilter').value;
  const af=document.getElementById('areaFilter').value;
  return leads.filter(l=>{
    const mq=!q||(l.name||'').toLowerCase().includes(q)||(l.phone||'').includes(q);
    const ms=!sf||(l.status||'')===sf;
    const ma=!af||(l.area||'')===af;
    return mq&&ms&&ma;
  });
}

function badgeClass(s){
  if(!s)return 'b-other';
  const m=s.toLowerCase();
  if(m.includes('contacted'))return 'b-contacted';
  if(m.includes('appointment'))return 'b-apt';
  if(m.includes('loan'))return 'b-loan';
  if(m.includes('no answer'))return 'b-noanswer';
  if(m.includes('not interested'))return 'b-notint';
  if(m.includes('phishing'))return 'b-phishing';
  if(m.includes('subsale'))return 'b-subsale';
  if(m.includes('no join'))return 'b-nojoin';
  if(m.includes('rejecting'))return 'b-noanswer';
  return 'b-other';
}

function render(){
  const rows=filtered();
  const total=leads.length;
  const counts={};
  leads.forEach(l=>{counts[l.status]=(counts[l.status]||0)+1;});
  const contacted=counts['Contacted']||0;
  const apts=counts['Appointment Set']||0;
  const loan=counts['Loan Issues']||0;
  const noAns=(counts['No Answer']||0)+(counts['Rejecting Call']||0);
  const notInt=counts['Not Interested']||0;

  document.getElementById('metrics').innerHTML=`
    <div class="metric m-total"><div class="label">Total Leads</div><div class="val">${total}</div></div>
    <div class="metric m-contacted"><div class="label">Contacted</div><div class="val">${contacted}</div><div class="sub">${total?Math.round(contacted/total*100):0}% reach rate</div></div>
    <div class="metric m-apt"><div class="label">Appointments</div><div class="val">${apts}</div><div class="sub">${contacted?Math.round(apts/contacted*100):0}% of contacted</div></div>
    <div class="metric m-loan"><div class="label">Loan Issues</div><div class="val">${loan}</div><div class="sub">${total?Math.round(loan/total*100):0}% blocked</div></div>
    <div class="metric m-noanswer"><div class="label">No Answer</div><div class="val">${noAns}</div></div>
    <div class="metric m-notint"><div class="label">Not Interested</div><div class="val">${notInt}</div></div>
  `;

  document.getElementById('funnel').innerHTML=`
    <div class="fcol"><div class="fl">Called</div><div class="fn">${total}</div><div class="fp">100%</div></div>
    <div class="fcol"><div class="fl">Reached</div><div class="fn">${contacted}</div><div class="fp">${total?Math.round(contacted/total*100):0}%</div></div>
    <div class="fcol"><div class="fl">Appointments</div><div class="fn">${apts}</div><div class="fp">${contacted?Math.round(apts/contacted*100):0}% of reached</div></div>
    <div class="fcol"><div class="fl">Loan-Clear</div><div class="fn">${total-loan-noAns-notInt}</div><div class="fp">eligible pool</div></div>
  `;

  const start=page*PER;
  const pageRows=rows.slice(start,start+PER);
  document.getElementById('countLabel').textContent=rows.length!==total?`${rows.length} filtered`:'';

  if(pageRows.length===0){
    document.getElementById('tbody').innerHTML='<tr><td colspan="9"><div class="empty">No leads found.</div></td></tr>';
  } else {
    document.getElementById('tbody').innerHTML=pageRows.map((l,i)=>`
      <tr>
        <td style="color:var(--muted);font-size:11px">${start+i+1}</td>
        <td class="row-name">${esc(l.name||'—')}</td>
        <td class="row-phone">${esc(l.phone||'—')}</td>
        <td style="color:var(--muted)">${esc(l.area||'—')}</td>
        <td><span class="badge ${badgeClass(l.status)}">${esc(l.status||'—')}</span></td>
        <td style="color:var(--muted);font-size:11px">${esc(l.date||'—')}</td>
        <td style="color:var(--muted)">${l.salary?'RM '+esc(l.salary):'—'}</td>
        <td class="row-remark" title="${esc(l.remark||'')}">${esc((l.remark||'').slice(0,45))}${(l.remark||'').length>45?'…':''}</td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm" onclick="openModal('${l.id}')">Edit</button>
            <button class="btn btn-sm" style="color:var(--danger);border-color:rgba(255,95,95,.3)" onclick="confirmDelete('${l.id}','${esc(l.name||'')}')">Del</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  document.getElementById('pageInfo').textContent=`${Math.min(start+1,rows.length)}–${Math.min(start+PER,rows.length)} of ${rows.length}`;
  document.getElementById('prevBtn').disabled=page===0;
  document.getElementById('nextBtn').disabled=start+PER>=rows.length;
  document.getElementById('syncLabel').textContent='Live · '+total+' leads';
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function changePage(d){page=Math.max(0,page+d);render();}

// ── Modal ────────────────────────────────────────
function openModal(id=null){
  editId=id;
  const l=id?leads.find(x=>x.id===id):{};
  document.getElementById('modalTitle').textContent=id?'Edit Lead':'Add Lead';
  document.getElementById('f-name').value=l.name||'';
  document.getElementById('f-phone').value=l.phone||'';
  document.getElementById('f-area').value=l.area||'Semenyih';
  document.getElementById('f-status').value=l.status||'Contacted';
  document.getElementById('f-date').value=l.date||'';
  document.getElementById('f-salary').value=l.salary||'';
  document.getElementById('f-remark').value=l.remark||'';
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-name').focus();
}
function closeModal(){document.getElementById('modal').classList.remove('open');editId=null;}

async function saveLead(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){showToast('Name is required','error');return;}
  const data={
    name,
    phone:document.getElementById('f-phone').value.trim(),
    area:document.getElementById('f-area').value,
    status:document.getElementById('f-status').value,
    date:document.getElementById('f-date').value,
    salary:document.getElementById('f-salary').value.trim(),
    remark:document.getElementById('f-remark').value.trim(),
  };
  const btn=document.getElementById('saveBtn');
  btn.textContent='Saving…';btn.disabled=true;
  try{
    if(editId){
      await updateLead(editId,data);
      showToast('Lead updated ✓','success');
    } else {
      await insertLead(data);
      showToast('Lead added ✓','success');
    }
    closeModal();
    await fetchLeads();
  }catch(e){
    showToast('Error: '+e.message,'error');
  }finally{
    btn.textContent='Save Lead';btn.disabled=false;
  }
}

async function confirmDelete(id,name){
  if(!confirm(`Delete lead "${name}"? This cannot be undone.`))return;
  try{
    await deleteLead(id);
    showToast('Lead deleted','success');
    await fetchLeads();
  }catch(e){
    showToast('Error: '+e.message,'error');
  }
}

// ── Toast ────────────────────────────────────────
let toastTimer;
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+type+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

// ── Close modal on bg click ───────────────────────
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── Init ─────────────────────────────────────────
fetchLeads();
</script>
</body>
</html>
